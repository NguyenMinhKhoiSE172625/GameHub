<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎮 Download Hub - Game & Software</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <a href="#" class="logo" onclick="showHome()">🎮 Download Hub</a>
      <div class="header-actions">
        <div class="search-box">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="searchInput" placeholder="Tìm..." oninput="filterGames()">
        </div>
        <button class="btn-admin" id="btnAdmin" onclick="toggleAdmin()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <span id="adminBtnText">Admin</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Login Modal -->
  <div class="modal-overlay" id="loginModal">
    <div class="modal">
      <div class="modal-header">
        <h2>🔐 Đăng nhập Admin</h2>
        <button class="modal-close" onclick="closeLogin()">&times;</button>
      </div>
      <form onsubmit="doLogin(event)">
        <div class="form-group">
          <label>Tài khoản</label>
          <input type="text" id="loginUser" required autocomplete="username">
        </div>
        <div class="form-group">
          <label>Mật khẩu</label>
          <input type="password" id="loginPass" required autocomplete="current-password">
        </div>
        <p class="error-msg" id="loginError"></p>
        <button type="submit" class="btn-primary btn-full">Đăng nhập</button>
      </form>
    </div>
  </div>

  <!-- Main Content -->
  <main class="main">

    <!-- Tab Bar -->
    <div class="tab-bar" id="tabBar">
      <button class="tab-btn active" id="tabGame" onclick="switchTab('game')">🎮 Games <span class="tab-count" id="countGame">0</span></button>
      <button class="tab-btn" id="tabSoftware" onclick="switchTab('software')">💻 Software <span class="tab-count" id="countSoftware">0</span></button>
    </div>

    <!-- Home View -->
    <section id="homeView">
      <div class="games-grid" id="gamesGrid">
        <!-- Cards rendered by JS -->
      </div>
      <div class="empty-state" id="emptyState" style="display:none;">
        <div class="empty-icon">🎮</div>
        <h3>Chưa có game nào</h3>
        <p>Admin hãy đăng nhập để thêm game mới</p>
      </div>
    </section>

    <!-- Game Detail View -->
    <section id="detailView" style="display:none;">
      <button class="btn-back" onclick="showHome()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
        Quay lại
      </button>
      <div class="detail-content" id="detailContent">
        <!-- Rendered by JS -->
      </div>
    </section>

    <!-- Admin View -->
    <section id="adminView" style="display:none;">
      <div class="admin-header">
        <h2 id="adminTitle">⚙️ Quản lý</h2>
        <div style="display:flex;gap:8px;">
          <button class="btn-secondary" onclick="showConfigModal()">🔑 Cấu hình tài khoản</button>
          <button class="btn-secondary" onclick="syncAllGames()">🔄 Sync All</button>
          <button class="btn-primary" id="btnAddNew" onclick="showAddForm()">+ Thêm Mới</button>
        </div>
      </div>

      <!-- Add/Edit Form -->
      <div class="admin-form-wrapper" id="adminFormWrapper" style="display:none;">
        <form id="gameForm" onsubmit="saveGame(event)">
          <h3 id="formTitle">Thêm Game Mới</h3>

          <div class="form-group">
            <label>Tên game *</label>
            <input type="text" id="gameName" required placeholder="VD: ICARUS v3.0 + Full DLC + Online">
          </div>
          <input type="hidden" id="gameDate">

          <div class="form-group">
            <label>Ảnh bìa (URL)</label>
            <input type="text" id="gameImage" placeholder="https://... hoặc để trống dùng ảnh mặc định">
          </div>

          <div class="form-group">
            <label>Thể loại (phân cách bởi dấu phẩy)</label>
            <input type="text" id="gameGenres" placeholder="VD: Hành động, Phiêu lưu, Sinh tồn">
          </div>

          <div class="form-group">
            <label>Nguồn tải / Mật khẩu giải nén</label>
            <div class="source-selector">
              <label class="radio-card">
                <input type="radio" name="source" value="linkneverdie.com" checked>
                <span class="radio-label">🔗 linkneverdie.com</span>
              </label>
              <label class="radio-card">
                <input type="radio" name="source" value="hadoantv.com">
                <span class="radio-label">🔗 hadoantv.com</span>
              </label>
            </div>
          </div>

          <div class="form-group">
            <label>🔗 Notepad URL (tự động lấy link tải)</label>
            <input type="text" id="gameNotepadUrl" placeholder="https://hadoanttvnotepad.../... (dán URL trang VIP Notepad)">
            <small style="color:var(--text-muted);font-size:0.75rem;">Nếu có URL này, hệ thống sẽ tự động cập nhật link tải. Link thủ công bên dưới sẽ bị ghi đè.</small>
          </div>

          <div class="form-group">
            <label>
              <input type="checkbox" id="gameAutoSync" style="width:auto;margin-right:6px;">
              Tự động sync link định kỳ (mỗi 6 giờ)
            </label>
          </div>

          <div class="form-group">
            <label>Mô tả (tuỳ chọn)</label>
            <textarea id="gameDesc" rows="3" placeholder="Mô tả ngắn về game..."></textarea>
          </div>

          <div class="form-group">
            <label>Link tải (từng part)</label>
            <div id="partsContainer">
              <!-- Part inputs rendered by JS -->
            </div>
            <button type="button" class="btn-secondary" onclick="addPartInput()">+ Thêm Part</button>
          </div>

          <div class="form-actions">
            <button type="button" class="btn-secondary" onclick="cancelForm()">Huỷ</button>
            <button type="submit" class="btn-primary">💾 Lưu Game</button>
          </div>
          <input type="hidden" id="editingId">
        </form>
      </div>

      <!-- Games List -->
      <div class="admin-games-list" id="adminGamesList">
        <!-- Rendered by JS -->
      </div>

    <!-- Config Modal -->
    <div class="modal-overlay" id="configModal">
      <div class="modal" style="max-width:500px;">
        <div class="modal-header">
          <h2>🔑 Cấu hình</h2>
          <button class="modal-close" onclick="closeConfigModal()">&times;</button>
        </div>
        <form onsubmit="saveConfig(event)">
          <h4 style="color:var(--pink-light);margin-bottom:10px;">hadoantv.com</h4>
          <div class="form-row">
            <div class="form-group flex-1">
              <label>Username</label>
              <input type="text" id="cfgHadoanUser" placeholder="username">
            </div>
            <div class="form-group flex-1">
              <label>Password</label>
              <input type="password" id="cfgHadoanPass" placeholder="để trống giữ cũ">
            </div>
          </div>
          <h4 style="color:var(--pink-light);margin-bottom:10px;">linkneverdie.com</h4>
          <div class="form-row">
            <div class="form-group flex-1">
              <label>Username</label>
              <input type="text" id="cfgLndUser" placeholder="username">
            </div>
            <div class="form-group flex-1">
              <label>Password</label>
              <input type="password" id="cfgLndPass" placeholder="để trống giữ cũ">
            </div>
          </div>
          <h4 style="color:var(--pink-light);margin-bottom:10px;margin-top:16px;">GitHub (auto-push)</h4>
          <div class="form-group">
            <label>Repository (owner/repo)</label>
            <input type="text" id="cfgGithubRepo" placeholder="NguyenMinhKhoiSE172625/GameHub">
          </div>
          <div class="form-group">
            <label>Personal Access Token</label>
            <input type="password" id="cfgGithubToken" placeholder="để trống giữ cũ">
          </div>
          <div class="form-actions">
            <button type="button" class="btn-secondary" onclick="closeConfigModal()">Huỷ</button>
            <button type="submit" class="btn-primary">💾 Lưu</button>
          </div>
        </form>
      </div>
    </div>
    </section>

  </main>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="/js/app.js"></script>
</body>
</html>
